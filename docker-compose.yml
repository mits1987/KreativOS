services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WORKSPACE_DIR=/data/workspace
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - workspace_data:/data/workspace
    restart: unless-stopped

volumes:
  workspace_data:
